
name: Extract Firmware

on:
  workflow_dispatch:
    inputs:
      ota_url:
        description: "URL firmware (Gofile, Pixeldrain, MediaFire, GDrive, OneDrive, SourceForge, AFH, direct link)"
        required: true
        type: string
      extra_urls:
        description: "URL part tambahan untuk split firmware, pisah dengan koma (opsional)"
        required: false
        type: string
      partitions:
        description: "Partisi yang diekstrak, pisah koma (kosong = semua). Contoh: boot,vendor_boot,init_boot"
        required: false
        type: string
      release_tag:
        description: "Tag GitHub Release (kosongkan = tidak upload ke release)"
        required: false
        type: string

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y unrar p7zip-full xz-utils aria2

      - name: Download payload-dumper-go
        run: |
          LATEST=$(curl -s https://api.github.com/repos/ssut/payload-dumper-go/releases/latest \
            | grep "browser_download_url.*linux_amd64.tar.gz" \
            | cut -d '"' -f 4)
          curl -L "$LATEST" -o payload-dumper-go.tar.gz
          tar -xzf payload-dumper-go.tar.gz
          chmod +x payload-dumper-go
          ./payload-dumper-go --version || true

      - name: Download firmware parts
        run: |
          mkdir -p downloads

          # ── aria2c wrapper: 16 koneksi paralel ─────────────────────────────
          fast_download() {
            local URL="$1"
            local OUT="$2"
            shift 2
            aria2c "$URL" \
              --out="$OUT" \
              --dir="downloads" \
              --max-connection-per-server=16 \
              --min-split-size=5M \
              --split=16 \
              --file-allocation=none \
              --console-log-level=notice \
              "$@"
          }

          get_name_from_url() {
            basename "$(echo "$1" | cut -d'?' -f1)"
          }

          get_name_from_headers() {
            curl -sI -L "$1" \
              | grep -i "content-disposition" \
              | grep -oP 'filename=[^ \r\n;]+' \
              | sed 's/filename=//' \
              | tr -d '"' | head -1 | tr -d '\r'
          }

          # ── Fungsi download satu URL ─────────────────────────────────────────
          download_one() {
            local OTA_URL="$1"
            echo ""
            echo ">>> Downloading: $OTA_URL"

            # ── Gofile ────────────────────────────────────────────────────────
            if echo "$OTA_URL" | grep -q "gofile.io"; then
              echo "Detected: Gofile"
              FILE_ID=$(echo "$OTA_URL" | grep -oP '(?<=gofile\.io/d/)[^/?]+')

              # Ambil guest token
              TOKEN=$(curl -s "https://api.gofile.io/accounts" -X POST                 | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['token'])")
              echo "Token: $TOKEN"

              # Fetch file info dengan cookie + auth header
              INFO=$(curl -s "https://api.gofile.io/contents/${FILE_ID}?wt=4fd6sg89d7s6&cache=true"                 -H "Authorization: Bearer $TOKEN"                 -H "Cookie: accountToken=$TOKEN")

              # Parse response — handle berbagai struktur API Gofile
              echo "$INFO" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if d.get('status') != 'ok':
              print('ERROR: Gofile status =', d.get('status'), file=sys.stderr)
              sys.exit(1)
          data = d.get('data', {})
          # Coba 'children' (lama) atau 'contents' (baru)
          children = data.get('children') or data.get('contents') or {}
          if isinstance(children, dict):
              items = list(children.values())
          elif isinstance(children, list):
              items = children
          else:
              print('ERROR: children/contents tidak ditemukan', file=sys.stderr)
              print(json.dumps(data, indent=2), file=sys.stderr)
              sys.exit(1)
          for f in items:
              if isinstance(f, dict) and f.get('type') == 'file':
                  link = f.get('link') or f.get('downloadPage') or ''
                  if link:
                      print(f['name'] + '|' + link)
          " > gofile_tmp.txt

              echo "=== Files found on Gofile ==="
              cat gofile_tmp.txt

              while IFS='|' read -r FNAME FLINK; do
                [ -z "$FLINK" ] && continue
                fast_download "$FLINK" "$FNAME" "--header=Cookie:accountToken=$TOKEN"
              done < gofile_tmp.txt

            # ── Pixeldrain ──────────────────────────────────────────────────
            elif echo "$OTA_URL" | grep -q "pixeldrain.com"; then
              echo "Detected: Pixeldrain"
              FILE_ID=$(echo "$OTA_URL" | grep -oP '(?<=pixeldrain\.com/u/)[^/?]+')
              FNAME=$(curl -s "https://pixeldrain.com/api/file/${FILE_ID}/info" \
                | python3 -c "import sys,json; print(json.load(sys.stdin)['name'])")
              fast_download "https://pixeldrain.com/api/file/${FILE_ID}" "$FNAME"

            # ── MediaFire ───────────────────────────────────────────────────
            elif echo "$OTA_URL" | grep -q "mediafire.com"; then
              echo "Detected: MediaFire"
              DIRECT=$(curl -s "$OTA_URL" | grep -oP 'https://download[^"<>]+' | head -1)
              FNAME=$(get_name_from_url "$OTA_URL" | sed 's|/file$||')
              [ -z "$FNAME" ] && FNAME="mediafire_$(date +%Y%m%d_%H%M%S)"
              fast_download "$DIRECT" "$FNAME"

            # ── Google Drive ────────────────────────────────────────────────
            elif echo "$OTA_URL" | grep -qE "drive.google.com|docs.google.com"; then
              echo "Detected: Google Drive"
              pip install --upgrade gdown --quiet --break-system-packages
              FILE_ID=$(echo "$OTA_URL" | grep -oP '(?<=/d/)[^/?]+')
              [ -z "$FILE_ID" ] && FILE_ID=$(echo "$OTA_URL" | grep -oP '(?<=id=)[^&]+')
              mkdir -p gdrive_tmp
              gdown "https://drive.google.com/uc?id=${FILE_ID}&export=download" --output gdrive_tmp/ || \
              gdown "https://drive.google.com/open?id=${FILE_ID}" --output gdrive_tmp/
              mv gdrive_tmp/* downloads/ 2>/dev/null || true

            # ── OneDrive ────────────────────────────────────────────────────
            elif echo "$OTA_URL" | grep -qE "onedrive.live.com|1drv.ms|sharepoint.com"; then
              echo "Detected: OneDrive"
              ENCODED=$(python3 -c "
          import base64, sys
          url = sys.argv[1]
          b = base64.b64encode(url.encode()).decode().rstrip('=').replace('+','-').replace('/','_')
          print('https://api.onedrive.com/v1.0/shares/u!' + b + '/root/content')
          " "$OTA_URL")
              FNAME=$(get_name_from_headers "$ENCODED")
              [ -z "$FNAME" ] && FNAME="onedrive_$(date +%Y%m%d_%H%M%S)"
              fast_download "$ENCODED" "$FNAME"

            # ── SourceForge ─────────────────────────────────────────────────
            elif echo "$OTA_URL" | grep -q "sourceforge.net"; then
              echo "Detected: SourceForge"
              FNAME=$(get_name_from_headers "$OTA_URL")
              [ -z "$FNAME" ] && FNAME=$(get_name_from_url "$OTA_URL")
              [ -z "$FNAME" ] && FNAME="sourceforge_$(date +%Y%m%d_%H%M%S)"
              fast_download "$OTA_URL" "$FNAME"

            # ── AndroidFileHost ─────────────────────────────────────────────
            elif echo "$OTA_URL" | grep -q "androidfilehost.com"; then
              echo "Detected: AndroidFileHost"
              FID=$(echo "$OTA_URL" | grep -oP '(?<=fid=)[^&]+')
              DIRECT=$(curl -sL \
                -H "User-Agent: Mozilla/5.0 (Linux; Android 10) AppleWebKit/537.36" \
                -H "Referer: https://androidfilehost.com" \
                "$OTA_URL" \
                | grep -oP '(?<=href=")[^"]*androidfilehost[^"]*download[^"]*' | head -1)
              [ -z "$DIRECT" ] && DIRECT="https://androidfilehost.com/?fid=${FID}&action=download"
              FNAME=$(get_name_from_url "$OTA_URL")
              [ -z "$FNAME" ] && FNAME="afh_$(date +%Y%m%d_%H%M%S)"
              fast_download "$DIRECT" "$FNAME" \
                "--header=User-Agent:Mozilla/5.0 (Linux; Android 10) AppleWebKit/537.36" \
                "--header=Referer:https://androidfilehost.com"

            # ── Direct URL (fallback) ────────────────────────────────────────
            else
              echo "Detected: Direct URL"
              FNAME=$(get_name_from_headers "$OTA_URL")
              [ -z "$FNAME" ] && FNAME=$(get_name_from_url "$OTA_URL")
              [ -z "$FNAME" ] && FNAME="firmware_$(date +%Y%m%d_%H%M%S)"
              fast_download "$OTA_URL" "$FNAME"
            fi
          }

          # ── Download URL utama ───────────────────────────────────────────────
          download_one "${{ github.event.inputs.ota_url }}"

          # ── Download URL tambahan (split parts) ──────────────────────────────
          EXTRA="${{ github.event.inputs.extra_urls }}"
          if [ -n "$EXTRA" ]; then
            echo ""
            echo "=== Downloading split parts ==="
            IFS=',' read -ra EXTRA_URLS <<< "$EXTRA"
            for URL in "${EXTRA_URLS[@]}"; do
              URL=$(echo "$URL" | tr -d ' ')
              download_one "$URL"
            done
          fi

          echo ""
          echo "=== File yang didownload ==="
          ls -lh downloads/

      - name: Merge and extract
        run: |
          mkdir -p extracted output archive_tmp
          cd downloads

          echo "=== File di downloads/ ==="
          ls -lh

          # ── Deteksi split archive ──────────────────────────────────────────
          # Format: .zip.001/.zip.002, part1/part2, .7z.001, .r00/.r01, dsb.

          MERGED=0

          # Split ZIP: nama.zip.001, nama.zip.002
          if ls *.zip.001 2>/dev/null | grep -q .; then
            echo "SPLIT: ZIP multi-part (.zip.001) terdeteksi"
            FIRST=$(ls *.zip.001 | head -1)
            BASE="${FIRST%.zip.001}"
            cat "${BASE}".zip.* > "../${BASE}_merged.zip"
            echo "MERGED_FILE=${BASE}_merged.zip" >> $GITHUB_ENV
            MERGED=1

          # Split ZIP: nama.z01, nama.z02, nama.zip
          elif ls *.z01 2>/dev/null | grep -q .; then
            echo "SPLIT: ZIP multi-part (.z01) terdeteksi"
            FIRST=$(ls *.z01 | head -1)
            BASE="${FIRST%.z01}"
            zip -FF "${BASE}.zip" --out="../${BASE}_merged.zip" 2>/dev/null || \
            cat "${BASE}".z* "${BASE}.zip" > "../${BASE}_merged.zip"
            echo "MERGED_FILE=${BASE}_merged.zip" >> $GITHUB_ENV
            MERGED=1

          # Split 7z: nama.7z.001, nama.7z.002
          elif ls *.7z.001 2>/dev/null | grep -q .; then
            echo "SPLIT: 7z multi-part terdeteksi"
            FIRST=$(ls *.7z.001 | head -1)
            BASE="${FIRST%.7z.001}"
            # 7z handles multi-part natively dengan first part
            cp "${BASE}.7z.001" "../${BASE}.7z.001"
            for f in "${BASE}".7z.*; do
              [ "$f" != "${BASE}.7z.001" ] && cp "$f" "../$f"
            done
            echo "MERGED_FILE=${BASE}.7z.001" >> $GITHUB_ENV
            MERGED=1

          # Split RAR: nama.part1.rar, nama.part2.rar
          elif ls *.part1.rar 2>/dev/null | grep -q .; then
            echo "SPLIT: RAR multi-part (.part1.rar) terdeteksi"
            FIRST=$(ls *.part1.rar | head -1)
            echo "MERGED_FILE=${FIRST}" >> $GITHUB_ENV
            cp *.part*.rar ../
            MERGED=1

          # Split RAR lama: nama.rar, nama.r00, nama.r01
          elif ls *.r00 2>/dev/null | grep -q .; then
            echo "SPLIT: RAR multi-part (.r00) terdeteksi"
            FIRST=$(ls *.rar | head -1)
            echo "MERGED_FILE=${FIRST}" >> $GITHUB_ENV
            cp *.rar *.r* ../
            MERGED=1

          # Tidak ada split — file tunggal
          else
            echo "Single file terdeteksi"
            SINGLE=$(ls | head -1)
            cp "$SINGLE" "../$SINGLE"
            echo "MERGED_FILE=${SINGLE}" >> $GITHUB_ENV
          fi

          cd ..
          echo ""
          echo "=== File hasil merge ==="
          ls -lh "${MERGED_FILE}" 2>/dev/null || ls -lh

      - name: Detect format and extract
        run: |
          INFILE="$MERGED_FILE"
          FNAME="${INFILE,,}"
          echo "Extracting: $INFILE"

          # ── Ekstrak berdasarkan format ──────────────────────────────────────
          if [[ "$FNAME" == *.tar.xz ]] || [[ "$FNAME" == *.txz ]]; then
            echo "FORMAT: tar.xz"
            tar -xJf "$INFILE" -C archive_tmp/

          elif [[ "$FNAME" == *.tar.gz ]] || [[ "$FNAME" == *.tgz ]]; then
            echo "FORMAT: tar.gz"
            tar -xzf "$INFILE" -C archive_tmp/

          elif [[ "$FNAME" == *.tar.bz2 ]] || [[ "$FNAME" == *.tbz2 ]]; then
            echo "FORMAT: tar.bz2"
            tar -xjf "$INFILE" -C archive_tmp/

          elif [[ "$FNAME" == *.7z ]] || [[ "$FNAME" == *.7z.001 ]]; then
            echo "FORMAT: 7z"
            7z x "$INFILE" -o"archive_tmp/"

          elif [[ "$FNAME" == *.part1.rar ]] || [[ "$FNAME" == *.rar ]]; then
            echo "FORMAT: rar (multi-part atau single)"
            unrar x "$INFILE" archive_tmp/

          elif [[ "$FNAME" == *.xz ]]; then
            echo "FORMAT: xz (single file)"
            cp "$INFILE" archive_tmp/
            xz -d "archive_tmp/$(basename "$INFILE")"

          elif [[ "$FNAME" == *.zip ]] || [[ "$FNAME" == *.jar ]] \
            || [[ "$FNAME" == *.download ]] || [[ "$FNAME" == *_merged.zip ]]; then
            echo "FORMAT: zip"
            unzip -o "$INFILE" -d archive_tmp/

          else
            echo "FORMAT tidak dikenal, mencoba deteksi otomatis..."
            unzip -o "$INFILE" -d archive_tmp/ 2>/dev/null || \
            7z x "$INFILE" -o"archive_tmp/" 2>/dev/null || {
              echo "ERROR: Format tidak didukung!"
              file "$INFILE"
              exit 1
            }
          fi

          echo ""
          echo "=== Isi archive ==="
          find archive_tmp/ | head -50

          # ── Deteksi payload.bin atau .img ─────────────────────────────────
          echo ""
          echo "=== Semua file dalam archive ==="
          find archive_tmp/ -type f | sort

          if find archive_tmp/ -name "payload.bin" | grep -q .; then
            echo "MODE: OTA - payload.bin ditemukan"
            echo "EXTRACT_MODE=payload" >> $GITHUB_ENV
            find archive_tmp/ -name "payload.bin" -exec mv {} extracted/payload.bin \;
            ls -lh extracted/payload.bin

          elif find archive_tmp/ -type f -name "*.img" | grep -q .; then
            echo "MODE: Fastboot ROM - .img ditemukan"
            echo "EXTRACT_MODE=fastboot" >> $GITHUB_ENV

            PARTITIONS="${{ github.event.inputs.partitions }}"

            if [ -z "$PARTITIONS" ]; then
              echo "Mengekstrak SEMUA .img..."
              find archive_tmp/ -type f -name "*.img" | while read f; do
                mv "$f" output/
              done
            else
              # Normalize ke lowercase, hapus spasi
              PARTITIONS=$(echo "$PARTITIONS" | tr '[:upper:]' '[:lower:]' | tr -d ' ')
              echo "Mengekstrak partisi: $PARTITIONS"
              IFS=',' read -ra PARTS <<< "$PARTITIONS"
              for PART in "${PARTS[@]}"; do
                PART=$(echo "$PART" | tr -d ' ')
                FOUND=$(find archive_tmp/ -type f -iname "${PART}.img" | head -1)
                if [ -n "$FOUND" ]; then
                  mv "$FOUND" output/
                  echo "OK: ${PART}.img"
                else
                  echo "WARN: ${PART}.img tidak ditemukan"
                fi
              done
            fi

            echo ""
            echo "=== Hasil ekstraksi ==="
            ls -lh output/ 2>/dev/null || echo "Output kosong!"

          else
            echo "ERROR: Tidak ditemukan payload.bin maupun .img!"
            echo "File yang ada:"
            find archive_tmp/ -type f | sort
            exit 1
          fi

      - name: Dump payload.bin
        if: env.EXTRACT_MODE == 'payload'
        run: |
          PARTITIONS="${{ github.event.inputs.partitions }}"

          if [ -z "$PARTITIONS" ]; then
            echo "Mengekstrak SEMUA partisi dari payload.bin..."
            ./payload-dumper-go -o output/ extracted/payload.bin
          else
            PARTITIONS=$(echo "$PARTITIONS" | tr '[:upper:]' '[:lower:]' | tr -d ' ')
            echo "Mengekstrak partisi: $PARTITIONS"
            ./payload-dumper-go -o output/ -partitions "$PARTITIONS" extracted/payload.bin
          fi

          echo ""
          echo "=== Hasil ekstraksi ==="
          ls -lh output/

      - name: Compress output
        run: |
          # Cek ada file tidak
          FILE_COUNT=$(ls output/ 2>/dev/null | wc -l)
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "ERROR: output/ kosong, tidak ada file untuk di-compress!"
            ls -lah output/ || true
            exit 1
          fi
          echo "=== File yang akan di-compress ==="
          ls -lh output/
          cd output
          zip -r ../extracted_partitions.zip .
          cd ..
          ls -lh extracted_partitions.zip

      - name: Job summary
        run: |
          echo "## Hasil Ekstraksi" >> $GITHUB_STEP_SUMMARY
          echo "| File | Ukuran |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          ls -lh output/*.img 2>/dev/null | awk '{print "| "$9" | "$5" |"}' >> $GITHUB_STEP_SUMMARY || true
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** $EXTRACT_MODE" >> $GITHUB_STEP_SUMMARY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extracted-partitions
          path: output/
          retention-days: 7

      - name: Upload to GitHub Release
        if: ${{ github.event.inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: "Extracted Partitions - ${{ github.event.inputs.release_tag }}"
          body: |
            ## Extracted from Firmware
            **Source:** `${{ github.event.inputs.ota_url }}`
            **Mode:** `${{ env.EXTRACT_MODE }}`
            **Partitions:** `${{ github.event.inputs.partitions || 'all' }}`
          files: |
            output/*.img
            extracted_partitions.zip
          token: ${{ secrets.GITHUB_TOKEN }}
