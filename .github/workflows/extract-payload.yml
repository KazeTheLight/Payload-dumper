name: Extract Payload & Firmware

on:
  workflow_dispatch:
    inputs:
      ota_url:
        description: "URL OTA/Firmware ZIP (Gofile, Pixeldrain, MediaFire, GDrive, OneDrive, SourceForge, AFH, atau direct link)"
        required: true
        type: string
      partitions:
        description: "Partisi yang diekstrak (kosongkan = semua, contoh: boot,vendor_boot)"
        required: false
        type: string
      release_tag:
        description: "Tag untuk GitHub Release (kosongkan = tidak upload ke release)"
        required: false
        type: string

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download payload-dumper-go
        run: |
          LATEST=$(curl -s https://api.github.com/repos/ssut/payload-dumper-go/releases/latest \
            | grep "browser_download_url.*linux_amd64.tar.gz" \
            | cut -d '"' -f 4)
          echo "Downloading: $LATEST"
          curl -L "$LATEST" -o payload-dumper-go.tar.gz
          tar -xzf payload-dumper-go.tar.gz
          chmod +x payload-dumper-go
          ./payload-dumper-go --version || true

      - name: Download ZIP
        run: |
          OTA_URL="${{ github.event.inputs.ota_url }}"
          echo "Source URL: $OTA_URL"

          # ── Helper: ambil nama file dari path URL ───────────────────────────
          get_name_from_url() {
            basename "$(echo "$1" | cut -d'?' -f1)"
          }

          # ── Helper: ambil nama dari Content-Disposition ─────────────────────
          get_name_from_headers() {
            curl -sI -L "$1" \
              | grep -i "content-disposition" \
              | grep -oP 'filename=\K[^\r\n;]+' \
              | tr -d '"' | head -1 | tr -d '\r'
          }

          # ════════════════════════════════════════════════════════════════════
          # Gofile
          # ════════════════════════════════════════════════════════════════════
          if echo "$OTA_URL" | grep -q "gofile.io"; then
            echo "Detected: Gofile"
            FILE_ID=$(echo "$OTA_URL" | grep -oP '(?<=gofile\.io/d/)[^/?]+')

            TOKEN=$(curl -s "https://api.gofile.io/accounts" -X POST \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['token'])")

            INFO=$(curl -s "https://api.gofile.io/contents/${FILE_ID}?wt=4fd6sg89d7s6&cache=true" \
              -H "Authorization: Bearer $TOKEN")
            echo "$INFO" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for f in d['data']['children'].values():
              if f['type'] == 'file':
                  print(f['name'] + '|' + f['link'])
          " > gofile_files.txt
            cat gofile_files.txt

            FIRST=$(grep "\.zip" gofile_files.txt | head -1 || head -1 gofile_files.txt)
            ZIP_NAME=$(echo "$FIRST" | cut -d'|' -f1)
            ZIP_LINK=$(echo "$FIRST" | cut -d'|' -f2)
            curl -L "$ZIP_LINK" -H "Cookie: accountToken=$TOKEN" -o "$ZIP_NAME" --progress-bar

          # ════════════════════════════════════════════════════════════════════
          # Pixeldrain
          # ════════════════════════════════════════════════════════════════════
          elif echo "$OTA_URL" | grep -q "pixeldrain.com"; then
            echo "Detected: Pixeldrain"
            FILE_ID=$(echo "$OTA_URL" | grep -oP '(?<=pixeldrain\.com/u/)[^/?]+')

            ZIP_NAME=$(curl -s "https://pixeldrain.com/api/file/${FILE_ID}/info" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['name'])")

            curl -L "https://pixeldrain.com/api/file/${FILE_ID}" -o "$ZIP_NAME" --progress-bar

          # ════════════════════════════════════════════════════════════════════
          # MediaFire
          # ════════════════════════════════════════════════════════════════════
          elif echo "$OTA_URL" | grep -q "mediafire.com"; then
            echo "Detected: MediaFire"

            # Scrape direct download link dari halaman MediaFire
            DIRECT=$(curl -s "$OTA_URL" \
              | grep -oP '(?<=href=")[^"]*mediafire\.com/file/[^"]*' \
              | head -1)

            if [ -z "$DIRECT" ]; then
              # Coba format /file/ langsung
              DIRECT=$(curl -sL "$OTA_URL" \
                | grep -oP 'https://download[^"]+' \
                | head -1)
            fi

            echo "Direct link: $DIRECT"
            ZIP_NAME=$(get_name_from_url "$OTA_URL")
            # Hapus trailing /file/ path
            ZIP_NAME=$(echo "$ZIP_NAME" | sed 's|/file$||')
            [ -z "$ZIP_NAME" ] && ZIP_NAME="firmware_$(date +%Y%m%d_%H%M%S).zip"

            curl -L "$DIRECT" -o "$ZIP_NAME" --progress-bar

          # ════════════════════════════════════════════════════════════════════
          # Google Drive
          # ════════════════════════════════════════════════════════════════════
          elif echo "$OTA_URL" | grep -qE "drive.google.com|docs.google.com"; then
            echo "Detected: Google Drive"

            # Install gdown versi terbaru
            pip install --upgrade gdown --quiet --break-system-packages

            # Ekstrak file ID dari berbagai format URL GDrive
            FILE_ID=$(echo "$OTA_URL" | grep -oP '(?<=/d/)[^/?]+')
            if [ -z "$FILE_ID" ]; then
              FILE_ID=$(echo "$OTA_URL" | grep -oP '(?<=id=)[^&]+')
            fi
            echo "GDrive ID: $FILE_ID"
            GDRIVE_DIRECT="https://drive.google.com/uc?id=${FILE_ID}&export=download"

            # Download ke folder sementara untuk ambil nama file asli
            mkdir -p gdrive_tmp
            gdown "$GDRIVE_DIRECT" --output gdrive_tmp/ || {
              echo "gdown gagal, coba dengan format URL alternatif..."
              gdown "https://drive.google.com/open?id=${FILE_ID}" --output gdrive_tmp/
            }

            # Ambil nama file hasil download
            ZIP_NAME=$(ls gdrive_tmp/ | head -1)
            if [ -z "$ZIP_NAME" ]; then
              ZIP_NAME="gdrive_$(date +%Y%m%d_%H%M%S).zip"
            fi
            echo "Filename: $ZIP_NAME"
            mv "gdrive_tmp/$ZIP_NAME" "./$ZIP_NAME"

          # ════════════════════════════════════════════════════════════════════
          # OneDrive
          # ════════════════════════════════════════════════════════════════════
          elif echo "$OTA_URL" | grep -qE "onedrive.live.com|1drv.ms|sharepoint.com"; then
            echo "Detected: OneDrive"

            # Konversi share link ke direct download
            if echo "$OTA_URL" | grep -q "1drv.ms"; then
              # Resolve short URL dulu
              RESOLVED=$(curl -sI "$OTA_URL" | grep -i "location:" | awk '{print $2}' | tr -d '\r')
              [ -z "$RESOLVED" ] && RESOLVED="$OTA_URL"
            else
              RESOLVED="$OTA_URL"
            fi

            # Encode URL dan konversi ke direct download
            ENCODED=$(python3 -c "
          import base64, sys
          url = sys.argv[1]
          b = base64.b64encode(url.encode()).decode()
          b = b.rstrip('=').replace('+','-').replace('/','_')
          print('https://api.onedrive.com/v1.0/shares/u!' + b + '/root/content')
          " "$RESOLVED")

            echo "Direct URL: $ENCODED"
            ZIP_NAME=$(get_name_from_headers "$ENCODED")
            [ -z "$ZIP_NAME" ] && ZIP_NAME="onedrive_$(date +%Y%m%d_%H%M%S).zip"

            echo "Filename: $ZIP_NAME"
            curl -L "$ENCODED" -o "$ZIP_NAME" --progress-bar

          # ════════════════════════════════════════════════════════════════════
          # SourceForge
          # ════════════════════════════════════════════════════════════════════
          elif echo "$OTA_URL" | grep -q "sourceforge.net"; then
            echo "Detected: SourceForge"

            # SourceForge redirect otomatis ke mirror, tinggal follow
            ZIP_NAME=$(get_name_from_headers "$OTA_URL")
            [ -z "$ZIP_NAME" ] && ZIP_NAME=$(get_name_from_url "$OTA_URL")
            [ -z "$ZIP_NAME" ] && ZIP_NAME="sourceforge_$(date +%Y%m%d_%H%M%S).zip"

            echo "Filename: $ZIP_NAME"
            curl -L "$OTA_URL" -o "$ZIP_NAME" --progress-bar

          # ════════════════════════════════════════════════════════════════════
          # AndroidFileHost
          # ════════════════════════════════════════════════════════════════════
          elif echo "$OTA_URL" | grep -q "androidfilehost.com"; then
            echo "Detected: AndroidFileHost"

            # Ambil fid dari URL
            FID=$(echo "$OTA_URL" | grep -oP '(?<=fid=)[^&]+')
            echo "AFH FID: $FID"

            # Scrape direct link
            DIRECT=$(curl -sL \
              -H "User-Agent: Mozilla/5.0 (Linux; Android 10) AppleWebKit/537.36" \
              -H "Referer: https://androidfilehost.com" \
              "$OTA_URL" \
              | grep -oP '(?<=href=")[^"]*androidfilehost[^"]*download[^"]*' \
              | head -1)

            if [ -z "$DIRECT" ]; then
              DIRECT="https://androidfilehost.com/?fid=${FID}&action=download"
            fi

            ZIP_NAME=$(get_name_from_url "$OTA_URL")
            [ -z "$ZIP_NAME" ] && ZIP_NAME="afh_$(date +%Y%m%d_%H%M%S).zip"

            echo "Filename: $ZIP_NAME"
            curl -L "$DIRECT" \
              -H "User-Agent: Mozilla/5.0 (Linux; Android 10) AppleWebKit/537.36" \
              -H "Referer: https://androidfilehost.com" \
              -o "$ZIP_NAME" --progress-bar

          # ════════════════════════════════════════════════════════════════════
          # Direct URL (fallback)
          # ════════════════════════════════════════════════════════════════════
          else
            echo "Detected: Direct URL"
            ZIP_NAME=$(get_name_from_headers "$OTA_URL")
            [ -z "$ZIP_NAME" ] && ZIP_NAME=$(get_name_from_url "$OTA_URL")
            [ -z "$ZIP_NAME" ] && ZIP_NAME="firmware_$(date +%Y%m%d_%H%M%S).zip"

            echo "Filename: $ZIP_NAME"
            curl -L "$OTA_URL" -o "$ZIP_NAME" --progress-bar
          fi

          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          ls -lh "$ZIP_NAME"

      - name: Detect ZIP type and extract
        run: |
          mkdir -p extracted output
          echo "=== Isi ZIP ==="
          unzip -l "$ZIP_NAME" | head -60

          if unzip -l "$ZIP_NAME" | grep -q "payload\.bin"; then
            echo "MODE: OTA - payload.bin ditemukan"
            echo "EXTRACT_MODE=payload" >> $GITHUB_ENV

            unzip -o "$ZIP_NAME" payload.bin -d extracted/ || {
              unzip -o "$ZIP_NAME" "*/payload.bin" -d extracted/
              find extracted/ -name "payload.bin" -exec mv {} extracted/payload.bin \;
            }
            ls -lh extracted/payload.bin

          elif unzip -l "$ZIP_NAME" | grep -q "\.img"; then
            echo "MODE: Fastboot ROM - .img ditemukan langsung"
            echo "EXTRACT_MODE=fastboot" >> $GITHUB_ENV

            PARTITIONS="${{ github.event.inputs.partitions }}"

            if [ -z "$PARTITIONS" ]; then
              echo "Mengekstrak SEMUA .img..."
              unzip -o "$ZIP_NAME" "*.img" -d output/ 2>/dev/null || true
              unzip -o "$ZIP_NAME" "*/*.img" -d output/ 2>/dev/null || true
              find output/ -mindepth 2 -name "*.img" -exec mv {} output/ \;
            else
              echo "Mengekstrak partisi: $PARTITIONS"
              IFS=',' read -ra PARTS <<< "$PARTITIONS"
              for PART in "${PARTS[@]}"; do
                PART=$(echo "$PART" | tr -d ' ')
                unzip -o "$ZIP_NAME" "${PART}.img" -d output/ 2>/dev/null || \
                unzip -o "$ZIP_NAME" "*/${PART}.img" -d output/ 2>/dev/null || \
                echo "WARN: ${PART}.img tidak ditemukan"
              done
              find output/ -mindepth 2 -name "*.img" -exec mv {} output/ \;
            fi

            echo ""
            echo "=== Hasil ekstraksi ==="
            ls -lh output/*.img 2>/dev/null || echo "Tidak ada .img ditemukan!"

          else
            echo "ERROR: Tidak ditemukan payload.bin maupun .img di dalam ZIP!"
            unzip -l "$ZIP_NAME"
            exit 1
          fi

      - name: Dump payload.bin
        if: env.EXTRACT_MODE == 'payload'
        run: |
          PARTITIONS="${{ github.event.inputs.partitions }}"

          if [ -z "$PARTITIONS" ]; then
            echo "Mengekstrak SEMUA partisi dari payload.bin..."
            ./payload-dumper-go -o output/ extracted/payload.bin
          else
            echo "Mengekstrak partisi: $PARTITIONS"
            ./payload-dumper-go -o output/ -partitions "$PARTITIONS" extracted/payload.bin
          fi

          echo ""
          echo "=== Hasil ekstraksi ==="
          ls -lh output/

      - name: Compress output
        run: |
          cd output
          zip -r ../extracted_partitions.zip .
          cd ..
          ls -lh extracted_partitions.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extracted-partitions
          path: output/
          retention-days: 7

      - name: Upload to GitHub Release
        if: ${{ github.event.inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: "Extracted Partitions - ${{ github.event.inputs.release_tag }}"
          body: |
            ## Extracted from Firmware
            **Source:** `${{ github.event.inputs.ota_url }}`
            **Mode:** `${{ env.EXTRACT_MODE }}`
            **Partitions:** `${{ github.event.inputs.partitions || 'all' }}`
          files: |
            output/*.img
            extracted_partitions.zip
          token: ${{ secrets.GITHUB_TOKEN }}
