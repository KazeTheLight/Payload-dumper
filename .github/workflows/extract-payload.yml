name: Extract Firmware

on:
  workflow_dispatch:
    inputs:
      ota_url:
        description: "URL firmware (Gofile, Pixeldrain, MediaFire, GDrive, OneDrive, SourceForge, AFH, direct link)"
        required: true
        type: string
      extra_urls:
        description: "URL part tambahan untuk split firmware, pisah dengan koma (opsional)"
        required: false
        type: string
      partitions:
        description: "Partisi yang diekstrak, pisah koma (kosong = semua). Contoh: boot,vendor_boot,init_boot"
        required: false
        type: string
      release_tag:
        description: "Tag GitHub Release (kosongkan = tidak upload ke release)"
        required: false
        type: string

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools & PAC Extractor
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y unrar p7zip-full xz-utils aria2 gcc make git
          
          # Download payload-dumper-go
          LATEST=$(curl -s https://api.github.com/repos/ssut/payload-dumper-go/releases/latest \
            | grep "browser_download_url.*linux_amd64.tar.gz" \
            | cut -d '"' -f 4)
          curl -L "$LATEST" -o payload-dumper-go.tar.gz
          tar -xzf payload-dumper-go.tar.gz
          chmod +x payload-dumper-go
          sudo mv payload-dumper-go /usr/local/bin/
          
          # Build PAC Extractor dari bismoy-bot
          git clone https://github.com/bismoy-bot/PAC-Extractor.git pacextractor_repo
          cd pacextractor_repo
          
          echo "=== Isi folder dari PAC-Extractor ==="
          ls -la
          
          # Deteksi otomatis file .c atau Makefile
          if ls *.c 1> /dev/null 2>&1; then
            echo "Ditemukan file C di folder utama, memulai compile..."
            gcc -O2 *.c -o pacextractor
            chmod +x pacextractor
            sudo mv pacextractor /usr/local/bin/
          elif [ -d "src" ] && ls src/*.c 1> /dev/null 2>&1; then
            echo "Ditemukan file C di folder src/, memulai compile..."
            gcc -O2 src/*.c -o pacextractor
            chmod +x pacextractor
            sudo mv pacextractor /usr/local/bin/
          elif [ -f "Makefile" ] || [ -f "makefile" ]; then
            echo "Ditemukan Makefile, menjalankan perintah make..."
            make
            BIN_FILE=$(find . -maxdepth 1 -type f -executable ! -name "*.sh" | head -1)
            sudo mv "$BIN_FILE" /usr/local/bin/pacextractor
          else
            echo "ERROR: File .c atau Makefile tidak ditemukan!"
            exit 1
          fi
          cd ..

      - name: Download firmware parts
        run: |
          mkdir -p downloads
          
          fast_download() {
            local URL="$1"
            local OUT="$2"
            shift 2
            aria2c "$URL" \
              --out="$OUT" \
              --dir="downloads" \
              --max-connection-per-server=16 \
              --min-split-size=5M \
              --split=16 \
              --file-allocation=none \
              --console-log-level=notice \
              "$@"
          }

          get_name_from_url() { basename "$(echo "$1" | cut -d'?' -f1)"; }
          get_name_from_headers() { curl -sI -L "$1" | grep -i "content-disposition" | grep -oP 'filename=[^ \r\n;]+' | sed 's/filename=//' | tr -d '"' | head -1 | tr -d '\r'; }

          download_one() {
            local OTA_URL="$1"
            echo ">>> Downloading: $OTA_URL"

            if echo "$OTA_URL" | grep -q "gofile.io"; then
              FILE_ID=$(echo "$OTA_URL" | grep -oP '(?<=gofile\.io/d/)[^/?]+')
              TOKEN=$(curl -s "https://api.gofile.io/accounts" -X POST | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['token'])")
              INFO=$(curl -s "https://api.gofile.io/contents/${FILE_ID}?wt=4fd6sg89d7s6&cache=true" -H "Authorization: Bearer $TOKEN" -H "Cookie: accountToken=$TOKEN")
              
              echo "$INFO" | python3 -c "
              import sys, json
              d = json.load(sys.stdin)
              data = d.get('data', {})
              children = data.get('children') or data.get('contents') or {}
              items = list(children.values()) if isinstance(children, dict) else (children if isinstance(children, list) else [])
              for f in items:
                  if isinstance(f, dict) and f.get('type') == 'file':
                      link = f.get('link') or f.get('downloadPage') or ''
                      if link: print(f['name'] + '|' + link)
              " > gofile_tmp.txt

              while IFS='|' read -r FNAME FLINK; do
                [ -z "$FLINK" ] && continue
                fast_download "$FLINK" "$FNAME" "--header=Cookie:accountToken=$TOKEN"
              done < gofile_tmp.txt

            elif echo "$OTA_URL" | grep -q "pixeldrain.com"; then
              FILE_ID=$(echo "$OTA_URL" | grep -oP '(?<=pixeldrain\.com/u/)[^/?]+')
              FNAME=$(curl -s "https://pixeldrain.com/api/file/${FILE_ID}/info" | python3 -c "import sys,json; print(json.load(sys.stdin)['name'])")
              fast_download "https://pixeldrain.com/api/file/${FILE_ID}" "$FNAME"

            elif echo "$OTA_URL" | grep -q "mediafire.com"; then
              DIRECT=$(curl -s "$OTA_URL" | grep -oP 'https://download[^"<>]+' | head -1)
              FNAME=$(get_name_from_url "$OTA_URL" | sed 's|/file$||')
              [ -z "$FNAME" ] && FNAME="mediafire_$(date +%Y%m%d_%H%M%S)"
              fast_download "$DIRECT" "$FNAME"

            else
              FNAME=$(get_name_from_headers "$OTA_URL")
              [ -z "$FNAME" ] && FNAME=$(get_name_from_url "$OTA_URL")
              [ -z "$FNAME" ] && FNAME="firmware_$(date +%Y%m%d_%H%M%S)"
              fast_download "$OTA_URL" "$FNAME"
            fi
          }

          download_one "${{ github.event.inputs.ota_url }}"

          EXTRA="${{ github.event.inputs.extra_urls }}"
          if [ -n "$EXTRA" ]; then
            IFS=',' read -ra EXTRA_URLS <<< "$EXTRA"
            for URL in "${EXTRA_URLS[@]}"; do
              download_one "$(echo "$URL" | tr -d ' ')"
            done
          fi

      - name: Merge and Fast Detect
        run: |
          mkdir -p extracted output archive_tmp
          cd downloads

          # Merge Split Files (Singkat)
          MERGED_FILE=$(ls | head -1)
          if ls *.zip.001 >/dev/null 2>&1; then
            BASE="${MERGED_FILE%.zip.001}"
            cat "${BASE}".zip.* > "../${BASE}_merged.zip"
            MERGED_FILE="${BASE}_merged.zip"
          elif ls *.7z.001 >/dev/null 2>&1; then
            BASE="${MERGED_FILE%.7z.001}"
            cp "${BASE}".7z.* ../
            MERGED_FILE="${BASE}.7z.001"
          else
            cp "$MERGED_FILE" "../$MERGED_FILE"
          fi
          cd ..
          
          INFILE="$MERGED_FILE"
          FNAME="${INFILE,,}"
          echo "Processing: $INFILE"
          echo "MERGED_FILE=$MERGED_FILE" >> $GITHUB_ENV

          # FAST DETECTION & SELECTIVE EXTRACTION
          EXTRACT_MODE="unknown"
          
          if [[ "$FNAME" == *.pac ]]; then
             echo "EXTRACT_MODE=pac" >> $GITHUB_ENV
             cp "$INFILE" extracted/firmware.pac
             
          elif [[ "$FNAME" == *.tgz ]] || [[ "$FNAME" == *.tar.gz ]]; then
             if tar -tzf "$INFILE" | grep -q "payload.bin"; then
                echo "EXTRACT_MODE=payload" >> $GITHUB_ENV
                tar -xzf "$INFILE" --wildcards "*payload.bin" -C extracted/
             elif tar -tzf "$INFILE" | grep -q "\.img$"; then
                echo "EXTRACT_MODE=fastboot" >> $GITHUB_ENV
                tar -xzf "$INFILE" --wildcards "*.img" -C archive_tmp/
                find archive_tmp/ -name "*.img" -exec mv {} output/ \;
             fi
             
          else
             # For Zip, 7z, Rar
             if 7z l "$INFILE" | grep -q "payload.bin"; then
                echo "EXTRACT_MODE=payload" >> $GITHUB_ENV
                7z e "$INFILE" "payload.bin" -r -o"extracted/"
             elif 7z l "$INFILE" | grep -iq "\.pac$"; then
                echo "EXTRACT_MODE=pac" >> $GITHUB_ENV
                7z e "$INFILE" "*.pac" -r -o"extracted/"
                mv extracted/*.pac extracted/firmware.pac
             elif 7z l "$INFILE" | grep -q "\.img$"; then
                echo "EXTRACT_MODE=fastboot" >> $GITHUB_ENV
                7z e "$INFILE" "*.img" -r -o"output/"
             fi
          fi

          # Fallback jika deteksi pintar gagal
          if [ ! -f "extracted/payload.bin" ] && [ ! -f "extracted/firmware.pac" ] && [ -z "$(ls -A output/ 2>/dev/null)" ]; then
             echo "Selective extraction gagal, mengekstrak secara manual..."
             7z x "$INFILE" -o"archive_tmp/"
             find archive_tmp/ -name "payload.bin" -exec mv {} extracted/payload.bin \;
             find archive_tmp/ -name "*.pac" -exec mv {} extracted/firmware.pac \;
             find archive_tmp/ -name "*.img" -exec mv {} output/ \;
          fi

      - name: Process Payload / PAC
        run: |
          PARTITIONS="${{ github.event.inputs.partitions }}"
          PART_ARGS=""
          if [ -n "$PARTITIONS" ]; then
            PARTITIONS=$(echo "$PARTITIONS" | tr '[:upper:]' '[:lower:]' | tr -d ' ')
            PART_ARGS="-partitions $PARTITIONS"
            echo "Target partisi: $PARTITIONS"
          fi

          if [ -f "extracted/payload.bin" ]; then
            echo "Mengurai payload.bin..."
            payload-dumper-go -o output/ $PART_ARGS extracted/payload.bin
          elif [ -f "extracted/firmware.pac" ]; then
            echo "Mengurai file .PAC (Unisoc)..."
            pacextractor extracted/firmware.pac output/
            
            # Jika user meminta partisi spesifik pada PAC
            if [ -n "$PARTITIONS" ]; then
              mkdir -p output_filtered
              IFS=',' read -ra PARTS <<< "$PARTITIONS"
              for PART in "${PARTS[@]}"; do
                mv output/"${PART}.img" output_filtered/ 2>/dev/null || mv output/"${PART}.bin" output_filtered/ 2>/dev/null || true
              done
              rm -rf output/*
              mv output_filtered/* output/
            fi
          fi

          # Bersihkan file selain img/bin agar rapi
          find output/ -type f ! -name "*.img" ! -name "*.bin" -delete 2>/dev/null || true
          
          echo "=== Hasil Ekstraksi di output/ ==="
          ls -lh output/

      - name: Job summary
        run: |
          echo "## Hasil Ekstraksi" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** $(cat $GITHUB_ENV | grep EXTRACT_MODE | cut -d'=' -f2)" >> $GITHUB_STEP_SUMMARY
          echo "| File | Ukuran |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          ls -lh output/ 2>/dev/null | awk '{print "| "$9" | "$5" |"}' | grep -v "|  |" >> $GITHUB_STEP_SUMMARY || true

      - name: Upload artifact (GitHub Actions)
        uses: actions/upload-artifact@v4
        with:
          name: extracted-partitions
          path: output/*
          retention-days: 7

      - name: Upload to GitHub Release
        if: ${{ github.event.inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: "Extracted Partitions - ${{ github.event.inputs.release_tag }}"
          body: |
            ## Extracted from Firmware
            **Source:** `${{ github.event.inputs.ota_url }}`
            **Partitions:** `${{ github.event.inputs.partitions || 'all' }}`
          files: |
            output/*
          token: ${{ secrets.GITHUB_TOKEN }}
