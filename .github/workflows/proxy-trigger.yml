name: Proxy Trigger

on:
  workflow_dispatch:
    inputs:
      ota_url:
        description: "URL firmware"
        required: true
        type: string
      extra_urls:
        description: "URL part tambahan (opsional)"
        required: false
        type: string
      partitions:
        description: "Partisi yang diekstrak (kosong = semua)"
        required: false
        type: string
      release_tag:
        description: "Tag GitHub Release (opsional)"
        required: false
        type: string

jobs:
  proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Extract Firmware workflow
        run: |
          # Bangun JSON inputs
          INPUTS=$(python3 -c "
          import json, os
          inputs = {'ota_url': os.environ['OTA_URL']}
          if os.environ.get('EXTRA_URLS'):
              inputs['extra_urls'] = os.environ['EXTRA_URLS']
          if os.environ.get('PARTITIONS'):
              inputs['partitions'] = os.environ['PARTITIONS']
          if os.environ.get('RELEASE_TAG'):
              inputs['release_tag'] = os.environ['RELEASE_TAG']
          print(json.dumps({'ref': 'main', 'inputs': inputs}))
          ")

          echo "Triggering extract-payload.yml dengan inputs:"
          echo "$INPUTS" | python3 -c "import sys,json; print(json.dumps(json.load(sys.stdin), indent=2))"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/extract-payload.yml/dispatches" \
            -d "$INPUTS")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"
          [ -n "$BODY" ] && echo "Response: $BODY"

          if [ "$HTTP_CODE" = "204" ]; then
            echo "✅ Workflow extract-payload.yml berhasil di-trigger!"
          else
            echo "❌ Gagal trigger workflow. HTTP $HTTP_CODE"
            exit 1
          fi
        env:
          OTA_URL: ${{ github.event.inputs.ota_url }}
          EXTRA_URLS: ${{ github.event.inputs.extra_urls }}
          PARTITIONS: ${{ github.event.inputs.partitions }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
