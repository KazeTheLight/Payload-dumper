<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payload & Firmware Dumper CI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a3a;
      --accent: #7c6aff;
      --accent2: #ff6a6a;
      --green: #4fffb0;
      --yellow: #ffe74c;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    .glow {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,106,255,0.12) 0%, transparent 70%);
      top: -200px; left: -200px;
      pointer-events: none;
      z-index: 0;
      animation: glow-move 8s ease-in-out infinite alternate;
    }

    @keyframes glow-move {
      to { transform: translate(300px, 200px); }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* Header */
    header {
      margin-bottom: 48px;
      animation: fade-up 0.6s ease both;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(124,106,255,0.15);
      border: 1px solid rgba(124,106,255,0.3);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 4px;
      margin-bottom: 16px;
      letter-spacing: 0.05em;
    }

    .badge::before { content: '◆'; font-size: 8px; }

    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      color: var(--muted);
      margin-top: 10px;
      font-size: 15px;
      font-family: var(--mono);
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 20px;
      animation: fade-up 0.6s ease both;
    }

    .card-title {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title::before {
      content: '';
      width: 20px; height: 1px;
      background: var(--accent);
    }

    /* Form */
    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.05em;
    }

    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,106,255,0.15);
    }

    input::placeholder { color: var(--muted); }

    /* Parts */
    .parts-list { display: flex; flex-direction: column; gap: 8px; }

    .part-row {
      display: flex;
      gap: 8px;
      align-items: center;
      animation: fade-up 0.3s ease both;
    }

    .part-row input { flex: 1; }

    .btn-remove {
      background: rgba(255,106,106,0.1);
      border: 1px solid rgba(255,106,106,0.3);
      color: var(--accent2);
      border-radius: 6px;
      width: 32px; height: 32px;
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .btn-remove:hover {
      background: rgba(255,106,106,0.2);
    }

    .btn-add {
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 8px 14px;
      font-family: var(--mono);
      font-size: 12px;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s;
      margin-top: 4px;
    }

    .btn-add:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Trigger button */
    .btn-trigger {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.02em;
    }

    .btn-trigger:hover:not(:disabled) {
      background: #9480ff;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(124,106,255,0.3);
    }

    .btn-trigger:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-trigger.loading::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      height: 3px;
      background: rgba(255,255,255,0.5);
      animation: loading-bar 1.5s ease-in-out infinite;
    }

    @keyframes loading-bar {
      0% { width: 0%; left: 0; }
      50% { width: 60%; left: 20%; }
      100% { width: 0%; left: 100%; }
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      font-family: var(--mono);
      font-size: 13px;
      z-index: 100;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      max-width: 320px;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error { border-color: var(--accent2); color: var(--accent2); }

    /* Runs list */
    .runs-list { display: flex; flex-direction: column; gap: 10px; }

    .run-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.2s;
      text-decoration: none;
      color: inherit;
    }

    .run-item:hover { border-color: var(--accent); }

    .run-status {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .run-status.completed { background: var(--green); }
    .run-status.in_progress {
      background: var(--yellow);
      animation: pulse 1s ease-in-out infinite;
    }
    .run-status.queued { background: var(--muted); }
    .run-status.failure { background: var(--accent2); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .run-info { flex: 1; min-width: 0; }

    .run-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .run-meta {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }

    .run-conclusion {
      font-family: var(--mono);
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .run-conclusion.success { background: rgba(79,255,176,0.1); color: var(--green); }
    .run-conclusion.failure { background: rgba(255,106,106,0.1); color: var(--accent2); }
    .run-conclusion.running { background: rgba(255,231,76,0.1); color: var(--yellow); }
    .run-conclusion.queued { background: rgba(107,107,128,0.1); color: var(--muted); }

    /* Artifacts */
    .artifacts-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }

    .artifact-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
    }

    .artifact-name {
      font-family: var(--mono);
      font-size: 12px;
    }

    .artifact-size {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    .btn-dl {
      background: rgba(124,106,255,0.15);
      border: 1px solid rgba(124,106,255,0.3);
      color: var(--accent);
      border-radius: 6px;
      padding: 5px 12px;
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }

    .btn-dl:hover { background: rgba(124,106,255,0.25); }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 8px 0;
    }

    /* Empty state */
    .empty {
      text-align: center;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      padding: 32px;
    }

    /* Animations */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }



    /* Refresh button */
    .btn-refresh {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 4px 10px;
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

    .runs-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="glow"></div>

  <div class="container">
    <header>
      <div class="badge">CI / CD</div>
      <h1>Payload<br /><span>Dumper</span></h1>
      <p class="subtitle">// extract firmware partitions via github actions</p>
    </header>

<!-- Worker URL hardcoded -->

    <!-- Trigger card -->
    <div class="card">
      <div class="card-title">trigger workflow</div>

      <div class="field">
        <label>OTA_URL — link firmware utama</label>
        <input type="text" id="otaUrl" placeholder="https://pixeldrain.com/u/..." />
      </div>

      <div class="field">
        <label>EXTRA_PARTS — split firmware (opsional)</label>
        <div class="parts-list" id="partsList"></div>
        <button class="btn-add" onclick="addPart()">+ Tambah Part</button>
      </div>

      <div class="field">
        <label>PARTITIONS — pisah koma, kosong = semua (opsional)</label>
        <input type="text" id="partitions" placeholder="boot,vendor_boot,init_boot" />
      </div>

      <div class="field">
        <label>RELEASE_TAG — upload ke GitHub Release (opsional)</label>
        <input type="text" id="releaseTag" placeholder="device-android-version" />
      </div>

      <div style="margin-top: 8px;">
        <button class="btn-trigger" id="btnTrigger" onclick="triggerWorkflow()">
          ⚡ Trigger Extraction
        </button>
      </div>
    </div>

    <!-- Runs card -->
    <div class="card">
      <div class="runs-header">
        <div class="card-title" style="margin:0">workflow runs</div>
        <button class="btn-refresh" onclick="loadRuns()">↻ Refresh</button>
      </div>
      <div class="runs-list" id="runsList">
        <div class="empty">Masukkan Worker URL untuk memuat runs</div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ── Config ──────────────────────────────────────────────────────────────
    const WORKER_URL = 'https://payloa-dumper.dianpermadibayu.workers.dev';
    const workerUrlInput = { value: WORKER_URL };
    const configDot = { className: '' };

    // Load saved worker URL
    
    const savedUrl = localStorage.getItem('workerUrl') || WORKER_URL_DEFAULT;
    workerUrlInput.value = savedUrl;
    configDot.className = 'config-dot ok';
    if (savedUrl) {
      workerUrlInput.value = savedUrl;
      configDot.className = 'config-dot ok';
    }



    function getWorkerUrl() {
      return (localStorage.getItem('workerUrl') || WORKER_URL).replace(/\/$/, '');
    }

    // ── Parts ───────────────────────────────────────────────────────────────
    function addPart(value = '') {
      const list = document.getElementById('partsList');
      const row = document.createElement('div');
      row.className = 'part-row';
      row.innerHTML = `
        <input type="text" placeholder="https://pixeldrain.com/u/..." value="${value}" />
        <button class="btn-remove" onclick="this.parentElement.remove()">×</button>
      `;
      list.appendChild(row);
    }

    function getExtraUrls() {
      return Array.from(document.querySelectorAll('.part-row input'))
        .map(i => i.value.trim())
        .filter(Boolean)
        .join(',');
    }

    // ── Trigger ─────────────────────────────────────────────────────────────
    async function triggerWorkflow() {
      const workerUrl = getWorkerUrl();
      if (!workerUrl) return showToast('Isi Worker URL dulu!', 'error');

      const otaUrl = document.getElementById('otaUrl').value.trim();
      if (!otaUrl) return showToast('OTA URL wajib diisi!', 'error');

      const btn = document.getElementById('btnTrigger');
      btn.disabled = true;
      btn.classList.add('loading');
      btn.textContent = 'Triggering...';

      try {
        const res = await fetch(`${workerUrl}/trigger`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            ota_url: otaUrl,
            extra_urls: getExtraUrls(),
            partitions: document.getElementById('partitions').value.trim(),
            release_tag: document.getElementById('releaseTag').value.trim(),
          }),
        });

        const data = await res.json();
        if (data.success) {
          showToast('✓ Workflow triggered!', 'success');
          document.getElementById('otaUrl').value = '';
          setTimeout(loadRuns, 2000);
        } else {
          showToast('Error: ' + (data.error || 'Unknown'), 'error');
        }
      } catch (e) {
        showToast('Gagal konek ke Worker: ' + e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.classList.remove('loading');
        btn.textContent = '⚡ Trigger Extraction';
      }
    }

    // ── Runs ────────────────────────────────────────────────────────────────
    async function loadRuns() {
      const workerUrl = getWorkerUrl();
      if (!workerUrl) return;

      const list = document.getElementById('runsList');
      list.innerHTML = '<div class="empty">Memuat...</div>';

      try {
        const res = await fetch(`${workerUrl}/runs?limit=10`);
        const data = await res.json();
        const runs = data.workflow_runs || [];

        if (!runs.length) {
          list.innerHTML = '<div class="empty">Belum ada runs</div>';
          return;
        }

        list.innerHTML = '';
        for (const run of runs) {
          const item = document.createElement('div');
          item.className = 'run-item';
          item.onclick = () => openRun(run.id);

          const status = run.status;
          const conclusion = run.conclusion;
          const statusClass = status === 'completed'
            ? (conclusion === 'success' ? 'completed' : 'failure')
            : status === 'in_progress' ? 'in_progress' : 'queued';

          const conclusionLabel = status === 'in_progress' ? 'running'
            : status === 'queued' ? 'queued'
            : conclusion || 'unknown';

          const conclusionClass = conclusion === 'success' ? 'success'
            : conclusion === 'failure' ? 'failure'
            : status === 'in_progress' ? 'running' : 'queued';

          const date = new Date(run.created_at);
          const timeAgo = formatTimeAgo(date);

          item.innerHTML = `
            <div class="run-status ${statusClass}"></div>
            <div class="run-info">
              <div class="run-name">#${run.run_number} — ${run.display_title || run.name}</div>
              <div class="run-meta">${timeAgo} · ${formatDuration(run)}</div>
            </div>
            <div class="run-conclusion ${conclusionClass}">${conclusionLabel}</div>
          `;
          list.appendChild(item);
        }
      } catch (e) {
        list.innerHTML = `<div class="empty">Error: ${e.message}</div>`;
      }
    }

    async function openRun(runId) {
      const workerUrl = getWorkerUrl();
      const res = await fetch(`${workerUrl}/runs/${runId}/artifacts`);
      const data = await res.json();
      const artifacts = data.artifacts || [];

      const runRes = await fetch(`${workerUrl}/runs/${runId}`);
      const run = await runRes.json();

      showRunDetail(run, artifacts);
    }

    function showRunDetail(run, artifacts) {
      const existing = document.getElementById('runDetail');
      if (existing) existing.remove();

      const card = document.createElement('div');
      card.id = 'runDetail';
      card.className = 'card';
      card.style.animationDelay = '0s';

      const artifactsHtml = artifacts.length
        ? artifacts.map(a => `
            <div class="artifact-item">
              <div>
                <div class="artifact-name">📦 ${a.name}</div>
                <div class="artifact-size">${formatBytes(a.size_in_bytes)}</div>
              </div>
              <a class="btn-dl" href="${run.html_url}" target="_blank">↗ Open</a>
            </div>
          `).join('')
        : '<div class="empty" style="padding:16px">Belum ada artifact</div>';

      card.innerHTML = `
        <div class="card-title">run detail — #${run.run_number}</div>
        <div style="font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:12px">
          ${run.display_title || run.name}<br/>
          Status: <span style="color:var(--text)">${run.status} ${run.conclusion ? '· ' + run.conclusion : ''}</span>
        </div>
        <div class="divider"></div>
        <div style="margin-top:12px;font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:8px">ARTIFACTS</div>
        <div class="artifacts-list">${artifactsHtml}</div>
        <div style="margin-top:14px">
          <a class="btn-dl" href="${run.html_url}" target="_blank" style="display:inline-block">
            ↗ Buka di GitHub
          </a>
        </div>
      `;

      const runsCard = document.querySelector('.card:last-child');
      runsCard.after(card);
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ── Utils ───────────────────────────────────────────────────────────────
    function formatTimeAgo(date) {
      const diff = Math.floor((Date.now() - date) / 1000);
      if (diff < 60) return `${diff}s ago`;
      if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
      return `${Math.floor(diff/86400)}d ago`;
    }

    function formatDuration(run) {
      if (!run
